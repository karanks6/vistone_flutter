name: vistone_app
description: "Vistone AI — AI-Powered Personal Color Palette Matcher"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Image processing natively
  image: ^4.5.2

  # Face detection for contours

  # Image picking (camera + gallery)
  image_picker: ^1.1.2

  # Persistence (onboarding flag)
  shared_preferences: ^2.3.5

  # Animations
  flutter_animate: ^4.5.0

  # Clipboard
  clipboard: ^0.1.3
  google_mlkit_face_mesh_detection: ^0.4.2
  google_fonts: ^6.3.2
  material_symbols_icons: ^4.2951.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/vistone_logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/vistone_logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/monk_skin_tone_color_recommendations.json
    - assets/icon/vistone_logo.png
